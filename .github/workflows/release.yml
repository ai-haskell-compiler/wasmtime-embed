name: Release source distributions

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  source-distributions:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.12.4"
          cabal-version: "3.14.2.0"

      - name: Build self-contained source distributions
        run: ./scripts/make-sdist.sh --output-directory=release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/*.tar.gz --generate-notes --verify-tag
