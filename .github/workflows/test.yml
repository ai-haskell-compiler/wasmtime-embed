name: Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: GHC ${{ matrix.ghc-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ghc-version:
          - "9.12.4"
          - "9.14.1"
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: ${{ matrix.ghc-version }}
          cabal-version: "3.14.2.0"

      - name: Prepare pinned Wasmtime artifact
        run: python3 scripts/prepare-wasmtime.py

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all
