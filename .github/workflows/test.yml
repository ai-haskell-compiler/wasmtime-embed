name: Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: GHC ${{ matrix.ghc-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        ghc-version:
          - "9.12.4"
          - "9.14.1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: haskell-actions/setup@33d9e1bb5b321fa8d6de86d9e9bbc251b4690b80 # v2
        with:
          ghc-version: ${{ matrix.ghc-version }}
          cabal-version: "3.14.2.0"

      - name: Cache pinned Wasmtime artifact
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor/wasmtime
          key: wasmtime-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('wasmtime-artifacts.json', 'scripts/prepare-wasmtime.py') }}

      - name: Prepare pinned Wasmtime artifact
        run: python3 scripts/prepare-wasmtime.py

      - name: Cache Cabal build
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: cabal-${{ runner.os }}-ghc-${{ matrix.ghc-version }}-${{ hashFiles('cabal.project', '**/*.cabal') }}
          restore-keys: |
            cabal-${{ runner.os }}-ghc-${{ matrix.ghc-version }}-

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all
